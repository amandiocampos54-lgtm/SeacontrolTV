<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seacontrol TV - Jogos PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #00c6ff, #0072ff, #00e0ff, #005f99);
  background-size: 400% 400%;
  animation: bg 15s ease infinite;
}
@keyframes bg {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

.container {
  display:flex;
  flex-direction:column;
  gap:20px;
  width:90%;
  max-width:420px;
  margin:auto;
}

.jogo {
  background: rgba(255,255,255,0.2);
  padding:15px;
  border-radius:15px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:15px;
  margin:5px;
  cursor:pointer;
}

canvas {
  background:black;
  border-radius:10px;
}

/* memória */
.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:5px;
}

.card {
  background:white;
  height:50px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Arcade PRO</h1>

<div class="container">

<!-- ⚡ CLICK GAME -->
<div class="jogo">
<h3>⚡ Clique em 5s</h3>
<p>Pontos: <span id="score">0</span></p>
<button onclick="startClick()">Start</button>
</div>

<!-- 🐍 SNAKE -->
<div class="jogo">
<h3>🐍 Snake</h3>
<canvas id="snake" width="300" height="300"></canvas>
</div>

<!-- 🧠 MEMÓRIA -->
<div class="jogo">
<h3>🧠 Memória</h3>
<div class="grid" id="grid"></div>
</div>

</div>

<script>
// CLICK GAME
let score=0, playing=false;

function startClick(){
  score=0;
  playing=true;
  document.body.onclick=()=>{
    if(playing){
      score++;
      document.getElementById("score").innerText=score;
    }
  }
  setTimeout(()=>{
    playing=false;
    alert("Fim! Pontos: "+score);
    document.body.onclick=null;
  },5000);
}

// SNAKE
const canvas=document.getElementById("snake");
const ctx=canvas.getContext("2d");

let snake=[{x:10,y:10}];
let food={x:5,y:5};
let dx=1, dy=0;

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"){dx=0;dy=-1}
  if(e.key==="ArrowDown"){dx=0;dy=1}
  if(e.key==="ArrowLeft"){dx=-1;dy=0}
  if(e.key==="ArrowRight"){dx=1;dy=0}
});

function drawSnake(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,300,300);

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x*15,s.y*15,14,14));

  ctx.fillStyle="red";
  ctx.fillRect(food.x*15,food.y*15,14,14);

  let head={x:snake[0].x+dx,y:snake[0].y+dy};
  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food.x=Math.floor(Math.random()*20);
    food.y=Math.floor(Math.random()*20);
  } else {
    snake.pop();
  }
}
setInterval(drawSnake,150);

// MEMÓRIA
const grid=document.getElementById("grid");
let valores=[1,1,2,2,3,3,4,4];
valores.sort(()=>Math.random()-0.5);

let selected=[];

valores.forEach(v=>{
  const div=document.createElement("div");
  div.className="card";
  div.dataset.valor=v;

  div.onclick=()=>{
    if(div.innerText) return;

    div.innerText=v;
    selected.push(div);

    if(selected.length===2){
      setTimeout(()=>{
        if(selected[0].dataset.valor!==selected[1].dataset.valor){
          selected[0].innerText="";
          selected[1].innerText="";
        }
        selected=[];
      },500);
    }
  };

  grid.appendChild(div);
});
</script>

</body>
</html>
