<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Bubble Trouble MAX</title>
<style>
body { margin:0; background:#0d0d0d; color:#fff; font-family:Arial; text-align:center;}
canvas { background:linear-gradient(#1a1a1a,#111); display:block; margin:10px auto; border:2px solid #333;}
</style>
</head>
<body>

<h3>Bubble Trouble MAX</h3>
<p>← → mover | espaço disparar</p>
<canvas id="game" width="900" height="520"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let state="menu";
let player, balls, rope, particles, powerups;
let score, lives, level, slowTimer, multiShot;

const gravity=0.35;

// INIT
function init(){
  player={x:430,y:480,w:40,h:20,speed:6};
  balls=[];
  rope=null;
  particles=[];
  powerups=[];
  score=0;
  lives=3;
  level=1;
  slowTimer=0;
  multiShot=0;
}

// SPAWN
function spawn(){
  balls=[];
  for(let i=0;i<level;i++){
    balls.push({
      x:150+i*150,
      y:200,
      r:35,
      dx:(Math.random()>0.5?1:-1)*(3+level*0.3),
      dy:-6
    });
  }
}

// INPUT
let keys={};
addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(state!=="playing"){start();}
  if(e.key===" " && !rope && state==="playing"){
    shoot();
  }
});
addEventListener("keyup",e=>keys[e.key]=false);

// SHOOT
function shoot(){
  rope={x:player.x+player.w/2,y:player.y,h:0};
  if(multiShot>0){
    setTimeout(()=>rope={x:player.x+player.w/2-10,y:player.y,h:0},50);
    setTimeout(()=>rope={x:player.x+player.w/2+10,y:player.y,h:0},100);
  }
}

// START
function start(){
  init();
  spawn();
  state="playing";
}

// LOOP
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  if(state==="menu"){
    text("Pressiona qualquer tecla",240);
    return requestAnimationFrame(loop);
  }

  if(state==="gameover"){
    text("GAME OVER",200);
    text("Score: "+score,240);
    text("Pressiona para jogar",280);
    return requestAnimationFrame(loop);
  }

  // PLAYER
  if(keys["ArrowLeft"]) player.x-=player.speed;
  if(keys["ArrowRight"]) player.x+=player.speed;
  player.x=Math.max(0,Math.min(c.width-player.w,player.x));

  ctx.fillStyle="#0f0";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // ROPE
  if(rope){
    rope.h+=12;
    ctx.fillStyle="#fff";
    ctx.fillRect(rope.x,rope.y-rope.h,3,rope.h);
    if(rope.y-rope.h<0) rope=null;
  }

  // BALLS
  balls.forEach((b,i)=>{
    let speedMod = slowTimer>0?0.5:1;

    b.x+=b.dx*speedMod;
    b.y+=b.dy*speedMod;
    b.dy+=gravity;

    if(b.y+b.r>c.height){
      b.y=c.height-b.r;
      b.dy=-Math.abs(b.dy)*0.9;
    }

    if(b.x-b.r<0||b.x+b.r>c.width) b.dx*=-1;

    ctx.beginPath();
    ctx.fillStyle="hsl("+b.r*5+",80%,60%)";
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();

    // PLAYER HIT
    if(
      b.x+b.r>player.x &&
      b.x-b.r<player.x+player.w &&
      b.y+b.r>player.y
    ){
      lives--;
      if(lives<=0){state="gameover";}
      else spawn();
    }

    // ROPE HIT
    if(rope &&
      Math.abs(b.x-rope.x)<b.r &&
      rope.y-rope.h<b.y+b.r
    ){
      explode(b.x,b.y,b.r);
      score+=10;

      // powerup drop
      if(Math.random()<0.2){
        powerups.push({x:b.x,y:b.y,type:Math.random()<0.5?"slow":"multi"});
      }

      if(b.r>12){
        balls.push(
          {x:b.x,y:b.y,r:b.r/2,dx:3,dy:-6},
          {x:b.x,y:b.y,r:b.r/2,dx:-3,dy:-6}
        );
      }

      balls.splice(i,1);
      rope=null;
    }
  });

  // PARTICLES
  particles.forEach((p,i)=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;

    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);

    if(p.life<=0) particles.splice(i,1);
  });

  // POWERUPS
  powerups.forEach((p,i)=>{
    p.y+=2;
    ctx.fillStyle=p.type==="slow"?"cyan":"magenta";
    ctx.fillRect(p.x,p.y,10,10);

    if(
      p.x>player.x &&
      p.x<player.x+player.w &&
      p.y>player.y
    ){
      if(p.type==="slow") slowTimer=300;
      if(p.type==="multi") multiShot=300;
      powerups.splice(i,1);
    }
  });

  if(slowTimer>0) slowTimer--;
  if(multiShot>0) multiShot--;

  // LEVEL CLEAR
  if(balls.length===0){
    level++;
    spawn();
  }

  // UI
  ctx.fillStyle="#fff";
  ctx.fillText("Score: "+score,10,20);
  ctx.fillText("Vidas: "+lives,10,40);
  ctx.fillText("Level: "+level,10,60);

  requestAnimationFrame(loop);
}

// PARTICLE EFFECT
function explode(x,y,r){
  for(let i=0;i<20;i++){
    particles.push({
      x:x,y:y,
      dx:(Math.random()-0.5)*4,
      dy:(Math.random()-0.5)*4,
      life:30
    });
  }
}

// TEXT
function text(t,y){
  ctx.font="24px Arial";
  ctx.fillText(t,300,y);
}

loop();
</script>

</body>
</html>
