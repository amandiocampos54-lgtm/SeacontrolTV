<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seacontrol TV - Jogos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
@keyframes gradientAnimation {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  color: #fff;
  overflow-x: hidden;
  background: linear-gradient(-45deg, #00c6ff, #0072ff, #00e0ff, #005f99);
  background-size: 400% 400%;
  animation: gradientAnimation 20s ease infinite;
}

header img {
  max-width: 220px;
  margin: 30px 0;
}

/* CONTAINER DOS JOGOS */
.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  width: 90%;
  max-width: 400px;
}

/* CARD JOGO */
.jogo {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* BOTÕES */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}

input {
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* VOLTAR */
.voltar {
  margin-top: 30px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  background: rgba(255,255,255,0.2);
  padding: 10px 20px;
  border-radius: 30px;
}

/* PARTÍCULAS */
.particle {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  animation: floatParticle linear infinite;
}

@keyframes floatParticle {
  0% { transform: translateY(0); opacity: 0.6; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/SsWW8Kwt/Launcher-Logo.png">
</header>

<div class="container">

  <!-- CLIQUE RÁPIDO -->
  <div class="jogo">
    <h3>⚡ Clique Rápido</h3>
    <p>Pontos: <span id="pontos">0</span></p>
    <button onclick="clicar()">Clica!</button>
  </div>

  <!-- ADIVINHAR -->
  <div class="jogo">
    <h3>🔢 Adivinha o Número</h3>
    <input type="number" id="palpite" placeholder="1 a 10">
    <br>
    <button onclick="adivinhar()">Tentar</button>
    <p id="res"></p>
  </div>

  <!-- PEDRA PAPEL TESOURA -->
  <div class="jogo">
    <h3>✊ Pedra Papel Tesoura</h3>
    <button onclick="ppt('pedra')">Pedra</button>
    <button onclick="ppt('papel')">Papel</button>
    <button onclick="ppt('tesoura')">Tesoura</button>
    <p id="resultado"></p>
  </div>

</div>

<a href="index.html" class="voltar">⬅ Voltar</a>

<script>
// Clique rápido
let pontos = 0;
function clicar() {
  pontos++;
  document.getElementById("pontos").innerText = pontos;
}

// Adivinhar número
let numero = Math.floor(Math.random() * 10) + 1;

function adivinhar() {
  let palpite = document.getElementById("palpite").value;
  let res = document.getElementById("res");

  if (palpite == numero) {
    res.innerText = "🎉 Acertaste!";
  } else {
    res.innerText = "❌ Era " + numero;
  }

  numero = Math.floor(Math.random() * 10) + 1;
}

// Pedra papel tesoura
function ppt(escolha) {
  let opcoes = ["pedra", "papel", "tesoura"];
  let cpu = opcoes[Math.floor(Math.random() * 3)];
  let r = "";

  if (escolha === cpu) r = "Empate!";
  else if (
    (escolha === "pedra" && cpu === "tesoura") ||
    (escolha === "papel" && cpu === "pedra") ||
    (escolha === "tesoura" && cpu === "papel")
  ) r = "Ganhaste!";
  else r = "Perdeste!";

  document.getElementById("resultado").innerText =
    "CPU: " + cpu + " → " + r;
}

// Partículas
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";

  const size = Math.random() * 4 + 2;
  p.style.width = size + "px";
  p.style.height = size + "px";

  p.style.left = Math.random() * 100 + "vw";
  p.style.top = Math.random() * 100 + "vh";

  p.style.animationDuration = (10 + Math.random() * 15) + "s";

  document.body.appendChild(p);
}
</script>

</body>
</html>
