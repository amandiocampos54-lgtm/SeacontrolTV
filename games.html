<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Bubble Trouble Clone</title>
<style>
  body { margin:0; background:#111; color:white; font-family:sans-serif; text-align:center; }
  canvas { background:#222; display:block; margin:10px auto; }
</style>
</head>
<body>

<h2>Bubble Trouble Clone</h2>
<p>← → mover | espaço disparar</p>
<canvas id="game" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameState = "menu";
let score = 0;
let level = 1;
let lives = 3;

const player = { x: 330, y: 410, w: 40, h: 20, speed: 5 };
let rope = null;
let balls = [];

const gravity = 0.25;

// INPUT
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (gameState === "menu") startGame();
  if (e.key === " " && !rope && gameState === "playing") {
    rope = { x: player.x + player.w/2, y: player.y, h: 0 };
  }
});
document.addEventListener("keyup", e => keys[e.key] = false);

// START
function startGame() {
  score = 0;
  level = 1;
  lives = 3;
  gameState = "playing";
  spawnLevel();
}

// SPAWN LEVEL
function spawnLevel() {
  balls = [{
    x: 200 + Math.random()*300,
    y: 200,
    r: 40,
    dx: 3,
    dy: -4
  }];
}

// UPDATE
function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (gameState === "menu") {
    drawText("Pressiona qualquer tecla", 200);
    return requestAnimationFrame(update);
  }

  if (gameState === "gameover") {
    drawText("GAME OVER", 180);
    drawText("Score: " + score, 230);
    drawText("Pressiona para reiniciar", 280);
    return requestAnimationFrame(update);
  }

  // PLAYER
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

  ctx.fillRect(player.x, player.y, player.w, player.h);

  // ROPE
  if (rope) {
    rope.h += 8;
    ctx.fillRect(rope.x, rope.y - rope.h, 2, rope.h);

    if (rope.y - rope.h <= 0) rope = null;
  }

  // BALLS
  balls.forEach((b, i) => {
    b.x += b.dx;
    b.y += b.dy;
    b.dy += gravity;

    // chão
    if (b.y + b.r > canvas.height) {
      b.y = canvas.height - b.r;
      b.dy *= -0.9;
    }

    // paredes
    if (b.x - b.r < 0 || b.x + b.r > canvas.width) {
      b.dx *= -1;
    }

    // desenhar
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();

    // colisão jogador
    if (
      b.x + b.r > player.x &&
      b.x - b.r < player.x + player.w &&
      b.y + b.r > player.y
    ) {
      lives--;
      if (lives <= 0) {
        gameState = "gameover";
      } else {
        spawnLevel();
      }
    }

    // colisão rope
    if (rope && Math.abs(b.x - rope.x) < b.r &&
        rope.y - rope.h < b.y + b.r) {

      score += 10;

      if (b.r > 15) {
        balls.push(
          { x:b.x, y:b.y, r:b.r/2, dx:3, dy:-5 },
          { x:b.x, y:b.y, r:b.r/2, dx:-3, dy:-5 }
        );
      }

      balls.splice(i,1);
      rope = null;
    }
  });

  // LEVEL CLEAR
  if (balls.length === 0) {
    level++;
    spawnLevel();
  }

  drawUI();

  requestAnimationFrame(update);
}

// UI
function drawUI() {
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("Vidas: " + lives, 10, 40);
  ctx.fillText("Level: " + level, 10, 60);
}

function drawText(text, y) {
  ctx.font = "20px sans-serif";
  ctx.fillText(text, 200, y);
}

// START LOOP
update();
</script>

</body>
</html>
