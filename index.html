<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seacontrol TV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
@keyframes gradientAnimation {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  color: #fff;
  overflow: hidden;
  background: linear-gradient(-45deg, #00c6ff, #0072ff, #00e0ff, #005f99);
  background-size: 400% 400%;
  animation: gradientAnimation 20s ease infinite;
}

header {
  margin-bottom: 40px;
}

header img {
  max-width: 250px;
  width: 80%;
}

nav {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
  width: 100%;
  max-width: 300px;
}

nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  background: rgba(255,255,255,0.2);
  color: white;
  text-decoration: none;
  font-weight: 600;
  padding: 12px 20px;
  border-radius: 30px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
  width: 100%;
  max-width: 250px;
}

nav a:hover {
  background: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

nav a img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

footer {
  margin-top: 40px;
  font-size: 0.9rem;
  color: #e0e0e0;
}

/* Partículas */
.particle {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  animation: floatParticle linear infinite;
}

@keyframes floatParticle {
  0% { transform: translateY(0); opacity: 0.6; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/SsWW8Kwt/Launcher-Logo.png" alt="Seacontrol TV Logo">
</header>

<nav>
  <a href="indexportugal.html">
    <img src="Images/portugal.png" alt="Portugal">
    Portugal
  </a>

  <a href="indexdeutschland.html">
    <img src="Images/germany.png" alt="Deutschland">
    Deutschland
  </a>

  <a href="indexfrance.html">
    <img src="Images/france.png" alt="France">
    France
  </a>

  <a href="indexespanha.html">
    <img src="Images/spain.png" alt="España">
    España
  </a>

  <a href="Downloads/downloads.html">📥 Downloads</a>
  <a href="links.html">🔗 Links Úteis</a>
</nav>

<footer>
  © <span id="year"></span> Seacontrol TV
</footer>

<script>
// Ano automático
document.getElementById("year").textContent = new Date().getFullYear();

// Partículas
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";

  const size = Math.random() * 4 + 2;
  p.style.width = size + "px";
  p.style.height = size + "px";

  p.style.left = Math.random() * 100 + "vw";
  p.style.top = Math.random() * 100 + "vh";

  p.style.animationDuration = (10 + Math.random() * 15) + "s";

  document.body.appendChild(p);
}
</script>

</body>
</html>
