<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seacontrol TV - Deutschland</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
}

header {
  text-align: center;
  padding: 40px 20px;
  color: white;
  background: linear-gradient(135deg, #000000, #DD0000, #FFD700);
}

header img {
  width: 120px;
  height: auto;
  margin-bottom: 10px;
}

nav {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

nav a {
  background: rgba(255,255,255,0.2);
  color: white;
  text-decoration: none;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 30px;
  transition: 0.3s;
}

nav a:hover {
  background: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

main {
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 {
  font-size: 1.5rem;
  margin-bottom: 20px;
  border-left: 5px solid #3b82f6;
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  cursor: pointer;
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  background: #273449;
}

.icon-card {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 12px;
}

/* ✅ ÍCONE 100px */
.icon-img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
}

.card h3 {
  font-size: 1.15rem;
  margin: 8px 0;
  color: #facc15;
  font-weight: 600;
}

.card p {
  font-size: 0.85rem;
  color: #cbd5e1;
  margin: 0;
}

.footer {
  text-align: center;
  padding: 20px;
  font-size: 0.85rem;
  color: #94a3b8;
}

.copied {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/SsWW8Kwt/Launcher-Logo.png" alt="Seacontrol TV Logo">

  <nav>
    <a href="index.html">⬅ Voltar</a>
    <a href="indexportugal.html">Portugal</a>
    <a href="indexfrance.html">France</a>
    <a href="indexespanha.html">España</a>
  </nav>
</header>

<main>

<section>
  <h2>MyTvOnline2</h2>

  <div class="grid">

    <div class="card" data-link="https://amandiocampos54-lgtm.github.io/SeacontrolTV/Deutschland/MyTvOnline2/Dynamo/config.enc2">
      <div class="icon-card">
        <img src="/SeacontrolTV/Images/input.png" alt="Input Code" class="icon-img">
      </div>
      <h3>Dynamo ✅ RZHH88</h3>
      <p>Configuração MyTvOnline2</p>
    </div>

    <div class="card" data-link="https://amandiocampos54-lgtm.github.io/SeacontrolTV/Deutschland/MyTvOnline2/DreamTV/config.enc2">
      <div class="icon-card">
        <img src="/SeacontrolTV/Images/input.png" alt="Input Code" class="icon-img">
      </div>
      <h3>DreamTV ✅ RZDREAM</h3>
      <p>Configuração MyTvOnline2</p>
    </div>

  </div>
</section>

<section>
  <h2>MyTvOnline3</h2>

  <div class="grid">

    <div class="card" data-link="https://amandiocampos54-lgtm.github.io/SeacontrolTV/Deutschland/MyTvOnline3/Dynamo/config.enc3">
      <div class="icon-card">
        <img src="/SeacontrolTV/Images/input.png" alt="Input Code" class="icon-img">
      </div>
      <h3>Dynamo ✅ RZ2HH88</h3>
      <p>Configuração MyTvOnline3</p>
    </div>

    <div class="card" data-link="https://amandiocampos54-lgtm.github.io/SeacontrolTV/Deutschland/MyTvOnline3/DreamTV/config.enc3">
      <div class="icon-card">
        <img src="/SeacontrolTV/Images/input.png" alt="Input Code" class="icon-img">
      </div>
      <h3>DreamTV ✅ RZ2DREAM</h3>
      <p>Configuração MyTvOnline3</p>
    </div>

  </div>
</section>

</main>

<div class="footer">© <span id="year"></span> Seacontrol TV · GitHub Pages</div>
<div class="copied" id="copied-msg"></div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const cards = document.querySelectorAll('.card');
const copiedMsg = document.getElementById('copied-msg');

cards.forEach(card => {
  card.addEventListener('click', () => {
    const link = card.dataset.link;

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(link).then(() => {
        copiedMsg.innerText = "Link copiado!";
        copiedMsg.style.display = 'block';
        setTimeout(() => copiedMsg.style.display = 'none', 3000);
      });
    } else {
      prompt('Copie o link:', link);
    }
  });
});
</script>

</body>
</html>
